function SessionView({ session }) {
  const [openIndex, setOpenIndex] = useState(0);

  return (
    <div style={{ padding: "24px", maxWidth: "1000px", margin: "0 auto" }}>
      <div style={{ color: session.accent, fontSize: "18px", letterSpacing: "2px", marginBottom: "8px" }}>{session.title}</div>
      <div style={{ color: "#558866", fontSize: "14px", marginBottom: "18px" }}>English dashboard edition. Source PDFs and DOCX lesson files remain unchanged in Romanian.</div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: "16px" }}>
        {session.cards.map((card, index) => (
          <div key={card.title} onClick={() => setOpenIndex(index)} style={{ border: `1px solid ${openIndex === index ? session.accent : "#1a3a2a"}`, background: openIndex === index ? `${session.accent}08` : "#0d1510", padding: "16px", cursor: "pointer", transition: "all 0.2s" }}>
            <div style={{ color: session.accent, fontSize: "18px", fontWeight: "bold", marginBottom: "10px" }}>{card.title}</div>
            <ul style={{ paddingLeft: "18px", color: "#a0c0b0", lineHeight: "1.6", marginBottom: "12px" }}>
              {card.points.map(point => <li key={point}>{point}</li>)}
            </ul>
            {openIndex === index && (
              <div>
                <div style={{ color: "#558866", fontSize: "13px", letterSpacing: "1px", marginBottom: "6px" }}>KEY EXAMPLES</div>
                {card.code.map(line => (
                  <div key={line} style={{ background: "#040810", border: "1px solid #1a2a1a", padding: "4px 8px", fontSize: "13px", color: "#88ffaa", marginBottom: "4px", fontFamily: "monospace" }}>{line}</div>
                ))}
                {card.links && card.links.length > 0 && (
                  <div style={{ marginTop: "12px" }}>
                    <div style={{ color: "#558866", fontSize: "13px", letterSpacing: "1px", marginBottom: "6px" }}>VISUAL AIDS</div>
                    {card.links.map(link => (
                      <a
                        key={link.href}
                        href={link.href}
                        target="_blank"
                        rel="noreferrer"
                        style={{
                          display: "inline-block",
                          border: `1px solid ${session.accent}`,
                          color: session.accent,
                          textDecoration: "none",
                          padding: "6px 10px",
                          marginRight: "8px",
                          marginBottom: "6px",
                          fontSize: "13px"
                        }}
                      >
                        {link.label}
                      </a>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

function HomeworkView({ hw }) {
  const [checked, setChecked] = useState({});

  useEffect(() => {
    setChecked({});
  }, [hw.title]);

  const toggle = item => setChecked(current => ({ ...current, [item]: !current[item] }));
  const done = hw.review ? hw.review.filter(item => checked[item]).length : 0;

  return (
    <div style={{ padding: "24px", maxWidth: "860px", margin: "0 auto" }}>
      <div style={{ color: hw.accent, fontSize: "18px", letterSpacing: "2px", marginBottom: "8px" }}>{hw.title}</div>
      <div style={{ color: "#c0a0d8", background: "#100a18", border: "1px solid #2a1a3a", padding: "14px", lineHeight: "1.7", marginBottom: "18px" }}>{hw.intro}</div>
      <div style={{ border: `1px solid ${hw.accent}44`, background: "#0d0a14", padding: "18px", marginBottom: "18px" }}>
        {hw.steps.map((step, index) => (
          <div key={step} style={{ marginBottom: "12px", color: "#a0c0b0", lineHeight: "1.6" }}>
            <span style={{ color: hw.accent, fontWeight: "bold", marginRight: "8px" }}>{`${index + 1}.`}</span>
            {step}
          </div>
        ))}
      </div>
      {hw.deliverables && hw.deliverables.length > 0 && (
        <div style={{ border: "1px solid #3a2a1a", padding: "16px", background: "#120d08", marginBottom: "18px" }}>
          <div style={{ color: "#c79f6e", fontSize: "14px", letterSpacing: "2px", marginBottom: "10px" }}>DELIVERABLES</div>
          {hw.deliverables.map(item => (
            <div key={item} style={{ marginBottom: "10px", color: "#d8c0a0", lineHeight: "1.6" }}>{item}</div>
          ))}
        </div>
      )}
      {hw.review && hw.review.length > 0 && (
        <div style={{ border: "1px solid #1a3a2a", background: "#0d0f0a", padding: "16px", marginBottom: "18px" }}>
          <div style={{ color: "#558866", fontSize: "14px", letterSpacing: "2px", marginBottom: "6px" }}>INTEGRATED REVIEW CHECKLIST</div>
          <div style={{ color: "#558866", fontSize: "13px", marginBottom: "12px" }}>{`${done}/${hw.review.length} checks marked`}</div>
          {hw.review.map(item => (
            <div key={item} onClick={() => toggle(item)} style={{ display: "flex", gap: "12px", alignItems: "flex-start", padding: "8px", cursor: "pointer", background: checked[item] ? "#00ff8808" : "transparent" }}>
              <div style={{ width: "16px", height: "16px", minWidth: "16px", border: "1px solid #00ff88", background: checked[item] ? "#00ff88" : "transparent", marginTop: "2px" }} />
              <div style={{ color: checked[item] ? "#558866" : "#a0c0b0", textDecoration: checked[item] ? "line-through" : "none", lineHeight: "1.6" }}>{item}</div>
            </div>
          ))}
        </div>
      )}
      {hw.cheat && hw.cheat.length > 0 && (
        <div style={{ border: "1px solid #1a3a2a", padding: "16px", background: "#050a08" }}>
          <div style={{ color: "#558866", fontSize: "14px", letterSpacing: "2px", marginBottom: "10px" }}>CHEAT SHEET</div>
          {hw.cheat.map(line => (
            <div key={line} style={{ background: "#040810", padding: "4px 8px", fontSize: "13px", color: "#66cc88", fontFamily: "monospace", marginBottom: "4px" }}>{line}</div>
          ))}
        </div>
      )}
    </div>
  );
}

function App() {
  const [tab, setTab] = useState("s1");
  const tabs = [["s1", "S1"], ["s2", "S2"], ["s3", "S3"], ["s4", "S4"], ["s5", "S5"], ["s6", "S6"], ["s7", "S7"], ["s8", "S8"], ["s9", "S9"], ["s10", "S10"], ["hw2", "HW2"], ["hw3", "HW3"], ["hw4", "HW4"], ["hw6", "HW6"], ["hw9", "HW9"]];

  return (
    <div style={{ minHeight: "100vh", background: "#0a0d12", fontFamily: "'Courier New', monospace", color: "#c8d8e8" }}>
      <div style={{ borderBottom: "1px solid #1e3a2a", padding: "14px 24px", display: "flex", alignItems: "center", gap: "12px", background: "linear-gradient(90deg,#0a0d12,#0d1a10)", flexWrap: "wrap" }}>
        <div style={{ color: "#00ff88", fontSize: "28px", fontWeight: "bold", letterSpacing: "3px" }}>QA::AUTOMATION</div>
        <div style={{ color: "#2a4a35" }}>|</div>
        <div style={{ color: "#558866", fontSize: "16px", letterSpacing: "2px" }}>SESSIONS 1-10</div>
        <div style={{ marginLeft: "auto", display: "flex", gap: "6px", flexWrap: "wrap" }}>
          {tabs.map(([id, label]) => (
            <button key={id} onClick={() => setTab(id)} style={{ background: tab === id ? "#00ff88" : "transparent", color: tab === id ? "#0a0d12" : "#00ff88", border: "1px solid #00ff88", padding: "5px 12px", fontSize: "14px", letterSpacing: "1px", cursor: "pointer", fontFamily: "inherit", fontWeight: tab === id ? "bold" : "normal" }}>{`[ ${label} ]`}</button>
          ))}
        </div>
      </div>
      {tab.startsWith("s") && <SessionView session={SESSIONS[tab]} />}
      {tab.startsWith("hw") && <HomeworkView hw={HOMEWORK[tab]} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
